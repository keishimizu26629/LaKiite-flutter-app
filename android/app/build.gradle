plugins {
    id "com.android.application"
    id "kotlin-android"
    // START: FlutterFire Configuration
    id "com.google.gms.google-services"
    // END: FlutterFire Configuration
    id "dev.flutter.flutter-gradle-plugin"
}

import java.io.FileNotFoundException

def kotlin_version = '2.1.0'

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new FileNotFoundException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.inoworl.lakiite"
    compileSdkVersion 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    signingConfigs {
        release {
            def envKeystorePath = System.getenv("ANDROID_UPLOAD_KEYSTORE_PATH")
            def envStorePassword = System.getenv("ANDROID_UPLOAD_KEYSTORE_PASSWORD")
            def envKeyAlias = System.getenv("ANDROID_UPLOAD_KEY_ALIAS")
            def envKeyPassword = System.getenv("ANDROID_UPLOAD_KEY_PASSWORD")

            if (envKeystorePath) {
                def envFile = new File(envKeystorePath)
                storeFile envFile.isAbsolute() ? envFile : rootProject.file(envKeystorePath)
            } else if (keystoreProperties['storeFile']) {
                storeFile file(keystoreProperties['storeFile'])
            } else {
                storeFile null
            }

            storePassword envStorePassword ?: keystoreProperties['storePassword']
            keyAlias envKeyAlias ?: keystoreProperties['keyAlias']
            keyPassword envKeyPassword ?: keystoreProperties['keyPassword']
        }
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.inoworl.lakiite"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true

    }

    // フレーバー設定
    flavorDimensions "environment"
    productFlavors {
        dev {
            dimension "environment"
            applicationId "com.inoworl.lakiite.dev"
            manifestPlaceholders = [
                    adMobApplicationId: "ca-app-pub-3940256099942544~3347511713"
            ]
            versionNameSuffix "-dev"
        }
        prod {
            dimension "environment"
            applicationId "com.inoworl.lakiite"
            manifestPlaceholders = [
                    adMobApplicationId: "ca-app-pub-6315199114988889~9761758494"
            ]
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}


dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}

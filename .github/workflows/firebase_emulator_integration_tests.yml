name: Firebase Emulator E2E Smoke Tests
run-name: Firebase Emulator E2E Smoke (${{ github.event_name }} - ${{ github.ref_name }})

# Heavy native-device smoke tests. Keep this workflow off pull_request; it is
# intended for manual runs and post-merge main branch smoke verification.
on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "integration_test/**"
      - "patrol_test/**"
      - "android/**"
      - "ios/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase_emulator_integration_tests.yml"
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.41.5"
  FIREBASE_EMULATOR_PROJECT_ID: demo-lakiite-emulator-test

concurrency:
  group: firebase-emulator-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android Firebase Emulator Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.9.1
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false

      - name: Setup Java 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: "21"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Patrol CLI
        run: flutter pub global activate patrol_cli

      - name: Create emulator Firebase config files
        run: |
          mkdir -p android/app/src/dev lib
          cat > android/app/src/dev/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "demo-lakiite-emulator-test",
              "storage_bucket": "demo-lakiite-emulator-test.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:demo",
                  "android_client_info": {
                    "package_name": "com.inoworl.lakiite.dev"
                  }
                },
                "api_key": [
                  {
                    "current_key": "demo-api-key"
                  }
                ]
              }
            ],
            "configuration_version": "1"
          }
          EOF
          cat > lib/firebase_options.dart <<'EOF'
          import 'package:firebase_core/firebase_core.dart';

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => const FirebaseOptions(
                  apiKey: 'demo-api-key',
                  appId: '1:1234567890:android:demo',
                  messagingSenderId: '1234567890',
                  projectId: 'demo-lakiite-emulator-test',
                  storageBucket: 'demo-lakiite-emulator-test.appspot.com',
                );
          }
          EOF
          cat > firebase.ci.json <<'EOF'
          {
            "emulators": {
              "auth": {
                "host": "0.0.0.0",
                "port": 9099
              },
              "firestore": {
                "host": "0.0.0.0",
                "port": 8080
              },
              "storage": {
                "host": "0.0.0.0",
                "port": 9199
              },
              "ui": {
                "enabled": false
              }
            }
          }
          EOF

      - name: Install Flutter dependencies
        run: |
          flutter pub get
          flutter packages pub run build_runner build --delete-conflicting-outputs

      - name: Run Android integration test
        timeout-minutes: 45
        uses: reactivecircus/android-emulator-runner@v2.35.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 1800
          script: |
            adb devices -l
            adb reverse tcp:9099 tcp:9099 || true
            adb reverse tcp:8080 tcp:8080 || true
            adb reverse tcp:9199 tcp:9199 || true
            adb reverse --list || true
            firebase --config firebase.ci.json emulators:exec --only auth,firestore,storage --project "$FIREBASE_EMULATOR_PROJECT_ID" "bash -lc 'set -euo pipefail; nc -vz 127.0.0.1 9099; nc -vz 127.0.0.1 8080; nc -vz 127.0.0.1 9199; adb reverse --list || true; patrol test --target patrol_test/firebase_emulator_smoke_test.dart --device emulator-5554 --flavor dev --show-flutter-logs --dart-define=USE_FIREBASE_EMULATOR=true --dart-define=FIREBASE_EMULATOR_HOST=10.0.2.2 --dart-define=TEST_MODE=true --dart-define=FLAVOR=development'"

      - name: Collect Android Patrol diagnostics
        if: always()
        run: |
          mkdir -p ci-diagnostics/android
          cp -R build/app/reports/androidTests ci-diagnostics/android/reports 2>/dev/null || true
          cp -R build/app/outputs/androidTest-results ci-diagnostics/android/results 2>/dev/null || true
          adb devices -l > ci-diagnostics/android/adb-devices.txt 2>&1 || true
          find build -maxdepth 5 -type f | sort > ci-diagnostics/android/build-files.txt 2>/dev/null || true

      - name: Upload Android Patrol diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-patrol-diagnostics
          path: ci-diagnostics/android
          if-no-files-found: ignore

  ios:
    name: iOS Firebase Emulator Smoke Test
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.9.1
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false

      - name: Setup Java 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: "21"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Patrol CLI
        run: flutter pub global activate patrol_cli

      - name: Create emulator Firebase config files
        run: |
          mkdir -p ios/Runner/Firebase/Dev lib
          cat > ios/Runner/Firebase/Dev/GoogleService-Info.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key>
            <string>demo-api-key</string>
            <key>GCM_SENDER_ID</key>
            <string>1234567890</string>
            <key>GOOGLE_APP_ID</key>
            <string>1:1234567890:ios:demo</string>
            <key>PROJECT_ID</key>
            <string>demo-lakiite-emulator-test</string>
            <key>STORAGE_BUCKET</key>
            <string>demo-lakiite-emulator-test.appspot.com</string>
            <key>BUNDLE_ID</key>
            <string>com.inoworl.lakiite.dev</string>
          </dict>
          </plist>
          EOF
          cat > lib/firebase_options.dart <<'EOF'
          import 'package:firebase_core/firebase_core.dart';

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => const FirebaseOptions(
                  apiKey: 'demo-api-key',
                  appId: '1:1234567890:ios:demo',
                  messagingSenderId: '1234567890',
                  projectId: 'demo-lakiite-emulator-test',
                  storageBucket: 'demo-lakiite-emulator-test.appspot.com',
                  iosBundleId: 'com.inoworl.lakiite.dev',
                );
          }
          EOF
          cat > firebase.ci.json <<'EOF'
          {
            "emulators": {
              "auth": {
                "host": "0.0.0.0",
                "port": 9099
              },
              "firestore": {
                "host": "0.0.0.0",
                "port": 8080
              },
              "storage": {
                "host": "0.0.0.0",
                "port": 9199
              },
              "ui": {
                "enabled": false
              }
            }
          }
          EOF

      - name: Install Flutter dependencies
        run: |
          flutter pub get
          flutter packages pub run build_runner build --delete-conflicting-outputs

      - name: Boot iOS simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')
          if [ -z "$DEVICE_ID" ]; then
            echo "::error ::No available iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          echo "IOS_SIMULATOR_ID=$DEVICE_ID" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Run iOS integration test
        timeout-minutes: 45
        run: |
          xcrun simctl list devices "$IOS_SIMULATOR_ID" || true
          xcrun simctl spawn "$IOS_SIMULATOR_ID" launchctl print system || true
          firebase --config firebase.ci.json emulators:exec --only auth,firestore,storage --project "$FIREBASE_EMULATOR_PROJECT_ID" "bash -lc 'set -euo pipefail; nc -vz 127.0.0.1 9099; nc -vz 127.0.0.1 8080; nc -vz 127.0.0.1 9199; patrol test --target patrol_test/firebase_emulator_smoke_test.dart --device $IOS_SIMULATOR_ID --flavor dev --show-flutter-logs --dart-define=USE_FIREBASE_EMULATOR=true --dart-define=FIREBASE_EMULATOR_HOST=localhost --dart-define=TEST_MODE=true --dart-define=FLAVOR=development'"

      - name: Collect iOS Patrol diagnostics
        if: always()
        run: |
          mkdir -p ci-diagnostics/ios
          xcrun simctl list devices > ci-diagnostics/ios/simctl-devices.txt 2>&1 || true
          for result in build/ios_results_*.xcresult; do
            [ -e "$result" ] || continue
            name=$(basename "$result")
            xcrun xcresulttool get test-results summary --path "$result" > "ci-diagnostics/ios/${name}.summary.json" 2>&1 || true
            xcrun xcresulttool get test-results tests --path "$result" > "ci-diagnostics/ios/${name}.tests.json" 2>&1 || true
          done
          find build -maxdepth 5 -type f | sort > ci-diagnostics/ios/build-files.txt 2>/dev/null || true

      - name: Upload iOS Patrol diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-patrol-diagnostics
          path: ci-diagnostics/ios
          if-no-files-found: ignore

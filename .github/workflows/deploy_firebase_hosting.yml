name: '[Release] Firebase Hosting'

on:
  push:
    branches: [dev, main]
    paths:
      - 'web/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy_firebase_hosting.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Firebase project alias'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev' || (github.event_name == 'workflow_dispatch' && inputs.target == 'dev')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: dev

    steps:
      - uses: actions/checkout@v5.0.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Restore Firebase service account
        run: |
          echo "${{ secrets.DEV_FIREBASE_SERVICE_ACCOUNT_KEY_BASE64 }}" | base64 -d > /tmp/firebase-service-account.json

      - name: Deploy Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json
        run: |
          firebase deploy \
            --only hosting \
            --project "${{ secrets.DEV_FIREBASE_PROJECT_ID }}"

  deploy-prod:
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.target == 'prod')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: prod

    steps:
      - uses: actions/checkout@v5.0.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Restore Firebase service account
        run: |
          echo "${{ secrets.PROD_FIREBASE_SERVICE_ACCOUNT_KEY_BASE64 }}" | base64 -d > /tmp/firebase-service-account.json

      - name: Deploy Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json
        run: |
          firebase deploy \
            --only hosting \
            --project "${{ secrets.PROD_FIREBASE_PROJECT_ID }}"
